version: "3.9"

services:
  db:
    image: postgres:15
    container_name: spotzy_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spotzy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: spotzy_app
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/spotzy
      JWT_SECRET:supersecretkey:
    restart: always

  
  redis:
    image: redis:7
    container_name: spotzy_redis
    ports:
      - "6379:6379"
volumes:
  postgres_data:
  